    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install the package
        run: pip install .[test]
      - name: Run the tests
        run: pytest --vv
